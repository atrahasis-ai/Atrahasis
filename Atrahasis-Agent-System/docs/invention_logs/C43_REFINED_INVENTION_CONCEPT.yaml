  - "Semantic enrichment can become dishonest if source-observed and bridge-inferred fields are not kept separate"
  - "Bridge-side warm state may drift toward shadow framework behavior if not bounded strictly"
  - "Snapshot invalidation and source inventory drift are operationally subtle"
prior_art_concerns:
